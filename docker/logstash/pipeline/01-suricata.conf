# =============================================================================
# Logstash Pipeline — Suricata IDS/IPS
# =============================================================================
# Receives Suricata EVE JSON logs via UDP from pfSense.
#
# pfSense Suricata → UDP 5140 → Logstash → OpenSearch (suricata-YYYY.MM.dd)
#
# To configure pfSense:
#   Suricata → Interfaces → (your WAN) → Eve Output Settings:
#     - Enable Eve JSON log: Yes
#     - Remote log server: <SIEM_HOST_IP>:5140 (UDP)
#     - Send as "flat" JSON (one top-level object per line)

input {
  udp {
    port => 5140
    type => "suricata"
    codec => "json"
  }
}

filter {
  if [type] == "suricata" {
    # Parse nested eve fields if present
    if [suricata][eve][timestamp] {
      date {
        match => [ "[suricata][eve][timestamp]", "ISO8601" ]
        target => "@timestamp"
      }
    }

    # Normalize event_type for dashboards
    if [suricata][eve][event_type] {
      mutate {
        add_field => { "event_type" => "%{[suricata][eve][event_type]}" }
      }
    }
  }
}

output {
  if [type] == "suricata" {
    opensearch {
      hosts => ["http://opensearch-hot:9200"]
      index => "suricata-%{+YYYY.MM.dd}"
      action => "index"
    }
  }
}
