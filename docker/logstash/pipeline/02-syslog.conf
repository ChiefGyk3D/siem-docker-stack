# =============================================================================
# Logstash Pipeline — Syslog (from syslog-ng)
# =============================================================================
# Receives pre-parsed JSON logs from syslog-ng over TCP 5045.
# Routes logs to different OpenSearch indices based on the source:
#
#   pfSense filterlog → pfsense-filterlog-YYYY.MM.dd
#   pfSense general   → pfsense-syslog-YYYY.MM.dd
#   UniFi devices     → unifi-syslog-YYYY.MM.dd
#   Everything else   → syslog-YYYY.MM.dd
#
# Flow: Device → syslog-ng (UDP/TCP 514) → Logstash (TCP 5045) → OpenSearch

input {
  tcp {
    port => 5045
    codec => "json_lines"
  }
}

filter {
  # Normalize key casing from syslog-ng RFC5424 JSON output.
  if ![program] and [PROGRAM] {
    mutate { rename => { "PROGRAM" => "program" } }
  }
  if ![message] and [MESSAGE] {
    mutate { rename => { "MESSAGE" => "message" } }
  }
  if ![source_host] and [HOST] {
    mutate { rename => { "HOST" => "source_host" } }
  }
  if ![timestamp] and [ISODATE] {
    mutate { rename => { "ISODATE" => "timestamp" } }
  }

  # Parse raw RFC5424 line embedded in message when syslog-ng forwards no-parse payload.
  # Use dissect first because fixture and pfSense forwarding are deterministic.
  if [message] and [message] =~ /^</ and [message] =~ />1 / {
    dissect {
      mapping => {
        "message" => "<%{syslog_pri}>1 %{rfc5424_ts} %{rfc5424_host} %{rfc5424_program} %{rfc5424_pid} %{rfc5424_msgid} %{rfc5424_sd} %{rfc5424_msg}"
      }
      tag_on_failure => ["_rfc5424_dissect_failure"]
    }

    if "_rfc5424_dissect_failure" in [tags] {
      grok {
        match => {
          "message" => "^<%{NONNEGINT:syslog_pri}>1 %{TIMESTAMP_ISO8601:rfc5424_ts} %{HOSTNAME:rfc5424_host} %{DATA:rfc5424_program} %{DATA:rfc5424_pid} %{DATA:rfc5424_msgid} %{DATA:rfc5424_sd} %{GREEDYDATA:rfc5424_msg}$"
        }
        tag_on_failure => ["_rfc5424_parse_failure"]
      }
    }

    if [rfc5424_program] {
      mutate {
        replace => { "program" => "%{rfc5424_program}" }
        replace => { "message" => "%{rfc5424_msg}" }
        replace => { "source_host" => "%{rfc5424_host}" }
        replace => { "timestamp" => "%{rfc5424_ts}" }
      }
    }
  }

  # Parse timestamp from syslog-ng's forwarded message
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
      target => "@timestamp"
      remove_field => [ "timestamp" ]
    }
  }

  # Route by source for separate indices
  if [source_host] {
    mutate {
      lowercase => [ "source_host" ]
    }
  }

  # Parse pfSense filterlog CSV payload for dashboard fields.
  # Keep this lightweight and extract only stable columns used by panels/alerts.
  if [program] == "filterlog" and [message] {
    dissect {
      mapping => {
        "message" => "%{rulenr},,,%{tracker},%{interface},%{reason},%{action},%{direction},%{ip_version},%{tail}"
      }
      tag_on_failure => []
    }

    # Extract common IPv4 src/dst/port tuple when present.
    grok {
      match => { "message" => ",%{IP:src_ip},%{IP:dst_ip},%{DATA:src_port},%{DATA:dst_port}(?:,|$)" }
      tag_on_failure => []
    }

    if [action] {
      mutate { lowercase => [ "action" ] }
    }
  }

  # Normalize CrowdSec events from pfSense/package logs.
  # Expected programs include crowdsec and crowdsec-firewall-bouncer.
  if ([program] and [program] =~ /^crowdsec/) or ([message] and [message] =~ /crowdsec/) {
    mutate {
      add_field => {
        "[event][module]" => "crowdsec"
      }
    }

    # Ensure pfSense CrowdSec RFC5424 lines are split before payload parsing.
    if [message] and [message] =~ /^</ and [message] =~ />1 / {
      dissect {
        mapping => {
          "message" => "<%{[rfc5424][pri]}>1 %{[rfc5424][ts]} %{[rfc5424][host]} %{[rfc5424][program]} %{[rfc5424][pid]} %{[rfc5424][msgid]} %{[rfc5424][sd]} %{[rfc5424][payload]}"
        }
        tag_on_failure => ["_crowdsec_rfc5424_dissect_failure"]
      }

      if [rfc5424][program] {
        mutate {
          replace => { "program" => "%{[rfc5424][program]}" }
          replace => { "source_host" => "%{[rfc5424][host]}" }
          replace => { "message" => "%{[rfc5424][payload]}" }
          replace => { "timestamp" => "%{[rfc5424][ts]}" }
        }
      }
    }

    # Parse JSON payload if message body is JSON.
    if [message] =~ /^\s*\{/ {
      json {
        source => "message"
        target => "crowdsec"
        skip_on_invalid_json => true
      }
    }

    # Parse common key=value fallback payloads.
    if ![crowdsec][action] and [message] =~ /action=/ {
      kv {
        source => "message"
        target => "crowdsec"
        field_split_pattern => "\\s+"
        value_split => "="
        trim_value => '"'
      }
    }

    # Promote source ip when available for dashboards and alert annotations.
    if [crowdsec][source_ip] {
      mutate {
        add_field => {
          "[source][ip]" => "%{[crowdsec][source_ip]}"
        }
      }
    } else if [crowdsec][value] {
      mutate {
        add_field => {
          "[source][ip]" => "%{[crowdsec][value]}"
        }
      }
    }
  }
}

output {
  # CrowdSec events
  if [event][module] == "crowdsec" or ([program] and [program] =~ /^crowdsec/) {
    opensearch {
      hosts => ["http://opensearch-hot:9200"]
      index => "crowdsec-events-%{+YYYY.MM.dd}"
      action => "index"
    }
  }
  # pfSense filterlog (firewall rules)
  else if [program] == "filterlog" {
    opensearch {
      hosts => ["http://opensearch-hot:9200"]
      index => "pfsense-filterlog-%{+YYYY.MM.dd}"
      action => "index"
    }
  }
  # pfSense general syslog
  else if [source_host] and [source_host] =~ /pfsense/ {
    opensearch {
      hosts => ["http://opensearch-hot:9200"]
      index => "pfsense-syslog-%{+YYYY.MM.dd}"
      action => "index"
    }
  }
  # UniFi network devices
  else if [source_host] and [source_host] =~ /unifi|ubnt|usg|usw|uap/ {
    opensearch {
      hosts => ["http://opensearch-hot:9200"]
      index => "unifi-syslog-%{+YYYY.MM.dd}"
      action => "index"
    }
  }
  # Everything else
  else {
    opensearch {
      hosts => ["http://opensearch-hot:9200"]
      index => "syslog-%{+YYYY.MM.dd}"
      action => "index"
    }
  }
}
