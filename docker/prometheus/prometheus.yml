# =============================================================================
# Prometheus Configuration
# =============================================================================
# Scrape targets for the SIEM stack. Add additional targets as needed.
#
# Default targets:
#   - Prometheus self-monitoring (:9090)
#   - OpenSearch hot node (:9200)
#   - OpenSearch warm node (:9201)
#   - Grafana (:3000)
#
# Optional targets (uncomment as needed):
#   - node_exporter (:9100) — installed on the host
#   - cAdvisor (:8080) — Docker container metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'opensearch-hot'
    metrics_path: '/_prometheus/metrics'
    static_configs:
      - targets: ['opensearch-hot:9200']

  - job_name: 'opensearch-warm'
    metrics_path: '/_prometheus/metrics'
    static_configs:
      - targets: ['opensearch-warm:9200']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  # Uncomment if you install node_exporter on the host:
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['host.docker.internal:9100']

  # Uncomment if you add cAdvisor:
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']

  # ===========================================================================
  # NVIDIA GPU Monitoring
  # ===========================================================================
  # Linux machines use dcgm-exporter (:9400)
  # Windows machines use nvidia_gpu_exporter (:9835)
  # See docs/gpu-monitoring.md for installation instructions.

  - job_name: 'nvidia-dcgm'
    scrape_interval: 15s
    static_configs:
      - targets: ['GPU_WORKSTATION_IP:9400']      # .env → GPU_WORKSTATION_IP
        labels:
          instance_name: 'workstation'
          gpu_role: 'desktop'
      - targets: ['GPU_LLM_SERVER_IP:9400']       # .env → GPU_LLM_SERVER_IP
        labels:
          instance_name: 'llm-server'
          gpu_role: 'inference'
      # Uncomment when transcoding server VLAN is ready:
      # - targets: ['TRANSCODE_SERVER_IP:9400']
      #   labels:
      #     instance_name: 'transcode-server'
      #     gpu_role: 'transcode'

  - job_name: 'nvidia-gpu-windows'
    scrape_interval: 15s
    static_configs:
      - targets: ['GPU_WINDOWS_STREAMING_IP:9835']  # .env → GPU_WINDOWS_STREAMING_IP
        labels:
          instance_name: 'streaming-pc'
          gpu_role: 'streaming'
