# =============================================================================
# Syslog-ng — Centralized Syslog Receiver & Wazuh Forwarder
# =============================================================================
# Receives syslog from pfSense, UniFi, and any RFC3164/5424 source.
#
# Architecture:
#   Devices → syslog-ng (UDP+TCP 514) → Local archive files
#                                       → Logstash (TCP 5045, JSON)
#                                       → Wazuh Manager (UDP 514, BSD syslog)
#
# pfSense sends RFC 5424 syslog with RFC 3339 microsecond timestamps.
# syslog-ng receives raw (no-parse), then the Wazuh log path uses an inline
# syslog-parser to extract RFC 5424 fields and re-emit as BSD syslog format
# so Wazuh's pre-decoder can extract hostname and program_name correctly.
#
# Logs are:
#   1. Archived locally under /var/log/syslog-ng/ (rotated daily)
#   2. Forwarded as JSON to Logstash on TCP 5045 for OpenSearch indexing
#   3. Forwarded as BSD syslog to Wazuh Manager on UDP 514 for EDR/SIEM

@version: 4.2
@include "scl.conf"

# =============================================================================
# Global Options
# =============================================================================
options {
    chain_hostnames(off);
    flush_lines(0);
    use_dns(no);
    use_fqdn(no);
    dns_cache(no);
    owner("root");
    group("adm");
    perm(0640);
    stats(freq(0));
    keep_hostname(yes);
    create-dirs(yes);
};

# =============================================================================
# Sources — Receive from network (raw, unparsed)
# =============================================================================
# flags(no-parse) preserves the raw message including PRI tag.
# Parsing happens per log-path where needed (e.g., Wazuh path).
source s_network_udp {
    network(
        transport("udp")
        port(514)
        flags(no-parse)
    );
};

source s_network_tcp {
    network(
        transport("tcp")
        port(514)
        flags(no-parse)
    );
};

# =============================================================================
# Parsers
# =============================================================================

# Parse RFC 5424 structured syslog (used in Wazuh log path)
parser p_rfc5424 {
    syslog-parser(flags(syslog-protocol));
};

# =============================================================================
# Filters — Classify by source
# =============================================================================

# Match pfSense filterlog (firewall rule hits)
filter f_pfsense_filterlog {
    program("filterlog");
};

# Match pfSense (all other programs)
# Adjust the host() pattern to match your pfSense IP/hostname
filter f_pfsense {
    # Match by hostname or program patterns common to pfSense
    program("filterlog") or
    program("dhcpd") or
    program("unbound") or
    program("openvpn") or
    program("dpinger") or
    program("php-fpm") or
    program("check_reload_status") or
    program("sshd") or
    program("cron");
};

# Match UniFi devices (adjust hostname pattern as needed)
filter f_unifi {
    host("^(USW|USG|UAP|UDM)" flags(ignore-case));
};

# All network devices (adjust to your subnet)
filter f_network {
    netmask("192.168.0.0/16");
};

# =============================================================================
# Destinations — Where logs go
# =============================================================================

# Local archival: daily rotated files by source IP
destination d_archive_all {
    file("/var/log/syslog-ng/${YEAR}/${MONTH}/${DAY}/${HOST}.log"
        create-dirs(yes)
    );
};

# pfSense filterlog: dedicated daily file
destination d_archive_pfsense {
    file("/var/log/syslog-ng/pfsense/${YEAR}-${MONTH}-${DAY}-filterlog.log"
        create-dirs(yes)
    );
};

destination d_archive_unifi {
    file("/var/log/syslog-ng/unifi/${YEAR}-${MONTH}-${DAY}.log"
        create-dirs(yes)
    );
};

# Forward to Logstash as JSON over TCP 5045
destination d_logstash {
    network(
        "logstash"
        port(5045)
        transport("tcp")
        template("$(format-json --scope rfc5424 --scope nv-pairs --key ISODATE)\n")
    );
};

# Forward to Wazuh Manager as BSD syslog over UDP 514
# Template re-formats parsed RFC 5424 into BSD format:
#   "Mar  7 14:29:36 hostname filterlog[80155]: CSV..."
# This allows Wazuh's pre-decoder to extract program_name correctly
# so the pfSense 'pf' decoder can match and parse filterlog CSV fields.
destination d_wazuh {
    network(
        "wazuh-manager"
        transport("udp")
        port(514)
        template("${S_DATE} ${HOST} ${MSGHDR}${MSG}\n")
    );
};

# =============================================================================
# Log Paths — Route messages
# =============================================================================

# Everything → local archive + Logstash
log {
    source(s_network_udp);
    source(s_network_tcp);
    destination(d_archive_all);
    destination(d_logstash);
};

# pfSense filterlog → dedicated archive (after RFC 5424 parsing)
log {
    source(s_network_udp);
    source(s_network_tcp);
    filter(f_pfsense);
    parser(p_rfc5424);
    filter(f_pfsense_filterlog);
    destination(d_archive_pfsense);
};

# UniFi → dedicated archive
log {
    source(s_network_udp);
    source(s_network_tcp);
    filter(f_unifi);
    destination(d_archive_unifi);
};

# Network devices → Wazuh: parse RFC 5424, re-emit as BSD syslog
log {
    source(s_network_udp);
    source(s_network_tcp);
    filter(f_network);
    parser(p_rfc5424);
    destination(d_wazuh);
};
